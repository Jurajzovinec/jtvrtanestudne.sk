      - generic [ref=e21]:
        - heading "Ako funguje vŕtaná studňa" [level=2] [ref=e22]
        - paragraph [ref=e23]: Vŕtaná studňa sa realizuje pomocou vrtného zariadenia, ktoré preniká do podzemných vrstiev až k vodonosným horizontom. Geologické podmienky sa líšia od lokality — či už v Žiline, Považskej Bystrici, Prievidzi alebo Martine, vždy posudzujeme podmienky individuálne. Určuje sa hĺbka vrtu (bežne cca 8 – 30 m), identifikuje vodonosná vrstva a volí vhodný priemer a vystrojenie vrtu.
      - generic [ref=e24]:
        - generic [ref=e25]:
          - img "Vŕtacia hlavica - rotačné a výplachové vŕtanie studní Žilina" [ref=e27]
          - generic [ref=e28]:
            - heading "Používané technológie" [level=2] [ref=e29]
            - paragraph [ref=e30]: Podľa podmienok používame rotačné vŕtanie, výplachové vŕtanie a rôzne priemery vrtov (cca 120 – 200 mm). Všetky materiály sú určené pre kontakt s pitnou vodou. Vŕtame ponorným kladivom aj hydraolickou vrtnou súpravou na gumených pásoch.
        - generic [ref=e31]:
          - img "PVC studničná rúra - konštrukcia vŕtanej studne" [ref=e33]
          - generic [ref=e34]:
            - heading "Konštrukcia studne" [level=2] [ref=e35]
            - paragraph [ref=e36]: Vŕtaná studňa sa skladá z pažnice (ochranné potrubie), filtračnej časti, štrkového obsypu a spodného zakončenia vrtu. Cieľom je zabezpečiť stabilný prítok vody a zabrániť prenikaniu nečistôt.
        - generic [ref=e37]:
          - img "Detail vŕtacej hlavice - výhody vŕtanej studne oproti kopanej" [ref=e39]
          - generic [ref=e40]:
            - heading "Výhody vŕtanej studne" [level=2] [ref=e41]
            - paragraph [ref=e42]: Stabilnejší zdroj vody ako kopaná studňa, prístup k hlbším vodonosným vrstvám, menšie riziko vysychania. Vhodné pre rodinné domy, chaty aj záhrady.
