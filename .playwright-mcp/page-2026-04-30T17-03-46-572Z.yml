      - generic [ref=e100]:
        - heading "Časté otázky" [level=2] [ref=e102]
        - generic [ref=e103]:
          - generic [ref=e104]:
            - heading "Koľko stojí vŕtanie studne?" [level=3] [ref=e105]
            - paragraph [ref=e106]: Orientačná cena je od 70€ za meter. Cena závisí od hĺbky vrtu, typu podložia a prístupnosti pozemku. Presnú cenu stanovíme po obhliadke.
          - generic [ref=e107]:
            - heading "Aká hĺbka vrtu je potrebná pre studňu?" [level=3] [ref=e108]
            - paragraph [ref=e109]: Hĺbka vrtu závisí od geologických podmienok, bežne je to 8 až 45 metrov. Voda sa nachádza v hĺbkach cca 10 – 40 metrov, podľa oblasti aj hlbšie.
          - generic [ref=e110]:
            - heading "Aké technológie používate na vŕtanie?" [level=3] [ref=e111]
            - paragraph [ref=e112]: Používame rotačné vŕtanie, výplachové vŕtanie ponorným kladivom aj hydraulickou vrtnou súpravou na gumených pásoch. Priemery vrtov sú 120 – 200 mm.
          - generic [ref=e113]:
            - heading "Kde všade pôsobíte?" [level=3] [ref=e114]
            - paragraph [ref=e115]: Pôsobíme v Žiline, Považskej Bystrici, Prievidzi, Martine a okolí v okruhu cca 80 km.
          - generic [ref=e116]:
            - heading "Ako dlho trvá vŕtanie studne?" [level=3] [ref=e117]
            - paragraph [ref=e118]: Vŕtanie studne trvá zvyčajne 1 – 3 dni podľa hĺbky vrtu a geologických podmienok. Samotné vŕtanie môže trvať len niekoľko hodín.
          - generic [ref=e119]:
            - heading "Potrebujem povolenie na vŕtanie studne?" [level=3] [ref=e120]
            - paragraph [ref=e121]: Na vŕtanie studne do hĺbky 30 m sa povolenie zvyčajne nevyžaduje, ale odporúčame sa informovať na príslušnom stavebnom úrade. Pri hlbších vrtoch môže byť potrebné súhlasné stanovisko.
          - generic [ref=e122]:
            - heading "Aká je životnosť vŕtanej studne?" [level=3] [ref=e123]
            - paragraph [ref=e124]: Pri správnom vystrojení a údržbe môže vŕtaná studňa slúžiť desaťročia. Kvalitná PVC pažnica a filtračná časť zabezpečujú dlhú životnosť bez problémov.
          - generic [ref=e125]:
            - heading "Čo je súčasťou ceny vŕtania?" [level=3] [ref=e126]
            - paragraph [ref=e127]: V cene je vystrojenie vrtu modrou atestovanou PVC studničnou rúrou, obsyp dunajským štrkom 4/8, utesnenie vrtu bentonitom a zátka na ukončenie rúry vrtu.
