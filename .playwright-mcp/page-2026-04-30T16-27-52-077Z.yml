    - generic [ref=e28]:
      - generic [ref=e29]:
        - img "Vŕtacia hlavica - používané technológie" [ref=e31]
        - generic [ref=e32]:
          - heading "Používané technológie" [level=2] [ref=e33]
          - paragraph [ref=e34]: Podľa podmienok používame rotačné vŕtanie, výplachové vŕtanie a rôzne priemery vrtov (cca 120 – 200 mm). Všetky materiály sú určené pre kontakt s pitnou vodou. Vŕtame ponorným kladivom aj hydraolickou vrtnou súpravou na gumených pásoch.
      - generic [ref=e35]:
        - img "Studničné rúry - konštrukcia studne" [ref=e37]
        - generic [ref=e38]:
          - heading "Konštrukcia studne" [level=2] [ref=e39]
          - paragraph [ref=e40]: Vŕtaná studňa sa skladá z pažnice (ochranné potrubie), filtračnej časti, štrkového obsypu a spodného zakončenia vrtu. Cieľom je zabezpečiť stabilný prítok vody a zabrániť prenikaniu nečistôt.
      - generic [ref=e41]:
        - img "Detail vŕtacej hlavice - výhody vŕtanej studne" [ref=e43]
        - generic [ref=e44]:
          - heading "Výhody vŕtanej studne" [level=2] [ref=e45]
          - paragraph [ref=e46]: Stabilnejší zdroj vody ako kopaná studňa, prístup k hlbším vodonosným vrstvám, menšie riziko vysychania. Vhodné pre rodinné domy, chaty aj záhrady.
