    - generic [ref=e17]:
      - generic [ref=e18]:
        - heading "Ako funguje vŕtaná studňa" [level=2] [ref=e19]
        - paragraph [ref=e20]: Vŕtaná studňa sa realizuje pomocou vrtného zariadenia, ktoré preniká do podzemných vrstiev až k vodonosným horizontom. Podľa geologických podmienok sa určuje hĺbka vrtu (bežne cca 8 – 45 m), identifikuje vodonosná vrstva a volí vhodný priemer a vystrojenie vrtu. Voda sa odoberá z hlbších vrstiev, čo zvyšuje stabilitu a kvalitu zdroja.
      - list [ref=e21]:
        - listitem [ref=e22]:
          - generic [ref=e23]: 
        - listitem [ref=e24]:
          - generic [ref=e25]: 
        - listitem [ref=e26]:
