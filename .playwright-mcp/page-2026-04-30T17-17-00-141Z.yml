      - generic [ref=e20]:
        - heading "Ako funguje vŕtaná studňa" [level=2] [ref=e21]
        - paragraph [ref=e22]: Vŕtaná studňa sa realizuje pomocou vrtného zariadenia, ktoré preniká do podzemných vrstiev až k vodonosným horizontom. Geologické podmienky sa líšia od lokality — či už v Žiline, Považskej Bystrici, Prievidzi alebo Martine, vždy posudzujeme podmienky individuálne. Určuje sa hĺbka vrtu (bežne cca 8 – 30 m), identifikuje vodonosná vrstva a volí vhodný priemer a vystrojenie vrtu.
      - generic [ref=e23]:
        - generic [ref=e24]:
          - img "Vŕtacia hlavica - rotačné a výplachové vŕtanie studní Žilina" [ref=e26]
          - generic [ref=e27]:
            - heading "Používané technológie" [level=2] [ref=e28]
            - paragraph [ref=e29]: Podľa podmienok používame rotačné vŕtanie, výplachové vŕtanie a rôzne priemery vrtov (cca 120 – 200 mm). Všetky materiály sú určené pre kontakt s pitnou vodou. Vŕtame ponorným kladivom aj hydraolickou vrtnou súpravou na gumených pásoch.
        - generic [ref=e30]:
          - img "PVC studničná rúra - konštrukcia vŕtanej studne" [ref=e32]
          - generic [ref=e33]:
            - heading "Konštrukcia studne" [level=2] [ref=e34]
            - paragraph [ref=e35]: Vŕtaná studňa sa skladá z pažnice (ochranné potrubie), filtračnej časti, štrkového obsypu a spodného zakončenia vrtu. Cieľom je zabezpečiť stabilný prítok vody a zabrániť prenikaniu nečistôt.
        - generic [ref=e36]:
          - img "Detail vŕtacej hlavice - výhody vŕtanej studne oproti kopanej" [ref=e38]
          - generic [ref=e39]:
