      - generic [ref=e99]:
        - heading "Časté otázky" [level=2] [ref=e101]
        - generic [ref=e102]:
          - generic [ref=e103]:
            - heading "Koľko stojí vŕtanie studne?" [level=3] [ref=e104]
            - paragraph [ref=e105]: Orientačná cena je od 70€ za meter. Cena závisí od hĺbky vrtu, typu podložia a prístupnosti pozemku. Presnú cenu stanovíme po obhliadke.
          - generic [ref=e106]:
            - heading "Aká hĺbka vrtu je potrebná pre studňu?" [level=3] [ref=e107]
            - paragraph [ref=e108]: Hĺbka vrtu závisí od geologických podmienok, bežne je to 8 až 45 metrov. Voda sa nachádza v hĺbkach cca 10 – 40 metrov, podľa oblasti aj hlbšie.
          - generic [ref=e109]:
            - heading "Aké technológie používate na vŕtanie?" [level=3] [ref=e110]
            - paragraph [ref=e111]: Používame rotačné vŕtanie, výplachové vŕtanie ponorným kladivom aj hydraulickou vrtnou súpravou na gumených pásoch. Priemery vrtov sú 120 – 200 mm.
          - generic [ref=e112]:
            - heading "Kde všade pôsobíte?" [level=3] [ref=e113]
            - paragraph [ref=e114]: Pôsobíme v Žiline, Považskej Bystrici, Prievidzi, Martine a okolí v okruhu cca 80 km.
          - generic [ref=e115]:
            - heading "Ako dlho trvá vŕtanie studne?" [level=3] [ref=e116]
            - paragraph [ref=e117]: Vŕtanie studne trvá zvyčajne 1 – 3 dni podľa hĺbky vrtu a geologických podmienok. Samotné vŕtanie môže trvať len niekoľko hodín.
          - generic [ref=e118]:
            - heading "Potrebujem povolenie na vŕtanie studne?" [level=3] [ref=e119]
            - paragraph [ref=e120]: Na vŕtanie studne do hĺbky 30 m sa povolenie zvyčajne nevyžaduje, ale odporúčame sa informovať na príslušnom stavebnom úrade. Pri hlbších vrtoch môže byť potrebné súhlasné stanovisko.
          - generic [ref=e121]:
            - heading "Aká je životnosť vŕtanej studne?" [level=3] [ref=e122]
            - paragraph [ref=e123]: Pri správnom vystrojení a údržbe môže vŕtaná studňa slúžiť desaťročia. Kvalitná PVC pažnica a filtračná časť zabezpečujú dlhú životnosť bez problémov.
          - generic [ref=e124]:
            - heading "Čo je súčasťou ceny vŕtania?" [level=3] [ref=e125]
            - paragraph [ref=e126]: V cene je vystrojenie vrtu modrou atestovanou PVC studničnou rúrou, obsyp dunajským štrkom 4/8, utesnenie vrtu bentonitom a zátka na ukončenie rúry vrtu.
