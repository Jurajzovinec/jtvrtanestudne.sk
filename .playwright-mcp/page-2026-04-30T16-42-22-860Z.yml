    - generic [ref=e17]:
      - heading "Ako funguje vŕtaná studňa" [level=2] [ref=e18]
      - paragraph [ref=e19]: Vŕtaná studňa sa realizuje pomocou vrtného zariadenia, ktoré preniká do podzemných vrstiev až k vodonosným horizontom. Podľa geologických podmienok sa určuje hĺbka vrtu (bežne cca 8 – 30 m), identifikuje vodonosná vrstva a volí vhodný priemer a vystrojenie vrtu. Voda sa odoberá z hlbších vrstiev, čo zvyšuje stabilitu a kvalitu zdroja.
    - generic [ref=e20]:
      - generic [ref=e21]:
        - img "Vŕtacia hlavica - rotačné a výplachové vŕtanie studní Žilina" [ref=e23]
        - generic [ref=e24]:
          - heading "Používané technológie" [level=2] [ref=e25]
          - paragraph [ref=e26]: Podľa podmienok používame rotačné vŕtanie, výplachové vŕtanie a rôzne priemery vrtov (cca 120 – 200 mm). Všetky materiály sú určené pre kontakt s pitnou vodou. Vŕtame ponorným kladivom aj hydraolickou vrtnou súpravou na gumených pásoch.
      - generic [ref=e27]:
        - img "PVC studničná rúra - konštrukcia vŕtanej studne" [ref=e29]
        - generic [ref=e30]:
          - heading "Konštrukcia studne" [level=2] [ref=e31]
          - paragraph [ref=e32]: Vŕtaná studňa sa skladá z pažnice (ochranné potrubie), filtračnej časti, štrkového obsypu a spodného zakončenia vrtu. Cieľom je zabezpečiť stabilný prítok vody a zabrániť prenikaniu nečistôt.
      - generic [ref=e33]:
        - img "Detail vŕtacej hlavice - výhody vŕtanej studne oproti kopanej" [ref=e35]
        - generic [ref=e36]:
